name: release

# on a v* tag: run the test on windows + mac + linux, and ONLY publish if all three pass , so a broken
# (or non-cross-platform) change never ships. publish via npm Trusted Publishing (OIDC), no stored token;
# requires the trusted publisher for `gitlog1` configured on npmjs.com (this repo + this workflow file).
# published version = package.json's version, so bump it then tag the matching v<version>.
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: npm >= 11.5.1 (trusted publishing / OIDC)
        run: npm install -g npm@latest
      - name: publish (via OIDC)
        run: npm publish --access public
